name: Issue Validation

on:
  issues:
    types: [opened, edited]

jobs:
  validate-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Check Issue has project number
        run: |
          BODY="${{ github.event.issue.body }}"
          TITLE="${{ github.event.issue.title }}"
          COMBINED="$TITLE $BODY"

          if ! echo "$COMBINED" | grep -qE '260[0-9]{4}[1-9]'; then
            echo "ISSUE_MISSING_PROJECT=true" >> $GITHUB_ENV
          fi

      - name: Close invalid Issue
        if: env.ISSUE_MISSING_PROJECT == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ 此 Issue 缺少 **项目编号**（格式：`2604XXX`）。\n\n请在 Issue 中补充所属 Skill 和项目编号，参考：https://github.com/${{ github.repository }}/blob/master/CONTRIBUTING.md\n\n不符合规范的 Issue 将被自动关闭。'
            })
            github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              state_reason: 'not_planned'
            })
