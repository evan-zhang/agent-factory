<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #FFFFFF;
  --bg-alt: #F5F5F7;
  --accent: #C97842;
  --accent-hover: #D98B52;
  --text: #1D1D1F;
  --text-secondary: #86868B;
  --border: #D2D2D7;
  --shadow: rgba(0,0,0,0.04);
}
body {
  font-family:"SF Pro Display","PingFang SC","Inter",-apple-system,"Helvetica Neue",sans-serif;
  color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased;
}
a { color:var(--accent); text-decoration:none; }

/* ===== HERO ===== */
.hero {
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:120px 160px; text-align:center;
}
.hero-title {
  font-size:64pt; font-weight:800; line-height:1.05; letter-spacing:-1.5px;
  color:var(--text); margin-bottom:24px; max-width:900px;
}
.hero-subtitle {
  font-size:22pt; font-weight:600; color:var(--text-secondary); margin-bottom:20px;
}
.hero-desc {
  font-size:15pt; line-height:1.6; color:var(--text-secondary); margin-bottom:40px;
  max-width:720px;
}
.hero-image {
  width:100%; max-width:1000px; min-height:480px;
  background:var(--bg-alt); border-radius:20px;
  margin:40px auto;
  display:flex; align-items:center; justify-content:center;
  font-size:14pt; color:var(--text-secondary);
}

/* ===== SECTIONS ===== */
.section {
  padding:100px 160px; background:var(--bg);
}
.section-alt { background:var(--bg-alt); }
.section-title {
  font-size:40pt; font-weight:800; color:var(--text); letter-spacing:-1px;
  text-align:center; margin-bottom:20px;
}
.section-desc {
  font-size:16pt; color:var(--text-secondary); text-align:center;
  margin-bottom:60px; max-width:700px; margin-left:auto; margin-right:auto;
}
.section-content {
  max-width:960px; margin:0 auto;
}
.section-content h3 {
  font-size:28pt; font-weight:700; color:var(--text);
  letter-spacing:-0.5px; margin-bottom:16px;
}
.section-content p {
  font-size:14pt; line-height:1.7; color:var(--text-secondary);
  margin-bottom:24px;
}
.section-content ul {
  margin:20px 0 24px; padding-left:28px;
}
.section-content li {
  font-size:14pt; line-height:1.7; color:var(--text-secondary);
  margin-bottom:8px;
}

/* ===== CTA ===== */
.cta {
  text-align:center; padding:100px 160px; background:var(--bg);
}
.cta-title {
  font-size:40pt; font-weight:800; color:var(--text); letter-spacing:-1px;
  margin-bottom:20px;
}
.cta-desc {
  font-size:16pt; color:var(--text-secondary); margin-bottom:40px;
}
.btn-cta {
  display:inline-block; font-size:15pt; font-weight:600; color:#FFF;
  background:var(--accent); padding:16px 40px; border-radius:12px; border:none; cursor:pointer;
  transition:background 0.2s,transform 0.2s;
}
.btn-cta:hover { background:var(--accent-hover); transform:translateY(-2px); }

/* ===== FOOTER ===== */
.footer {
  padding:32px 160px; border-top:1px solid var(--border);
  font-size:11pt; color:var(--text-secondary); text-align:center;
}

/* ===== RESPONSIVE ===== */
@media screen and (max-width:768px){
  .hero { padding:60px 40px; min-height:auto; }
  .hero-title { font-size:36pt; }
  .hero-subtitle { font-size:16pt; }
  .hero-desc { font-size:13pt; }
  .hero-image { min-height:320px; }
  .section, .cta { padding:60px 40px; }
  .section-title, .cta-title { font-size:28pt; }
  .section-desc, .cta-desc { font-size:14pt; }
  .footer { padding:24px 40px; }
}
@media screen and (max-width:480px){
  .hero { padding:40px 24px; }
  .hero-title { font-size:28pt; }
  .hero-subtitle { font-size:14pt; }
  .hero-desc { font-size:12pt; }
  .section, .cta { padding:40px 24px; }
  .section-title, .cta-title { font-size:22pt; }
  .section-desc, .cta-desc { font-size:13pt; }
  .footer { padding:20px 24px; }
}
@media print{
  body { background:#FFF; }
  .hero { min-height:auto; padding:20px; }
  .section, .cta { padding:20px; }
  .hero-image { display:none; }
}
</style>
</head>
<body>

<!-- ==================== HERO ==================== -->
<section class="hero">
  <h1 class="hero-title">{{HERO_TITLE}}</h1>
  <h2 class="hero-subtitle">{{HERO_SUBTITLE}}</h2>
  <p class="hero-desc">{{HERO_DESC}}</p>
  <div class="hero-image">{{HERO_IMAGE}}</div>
</section>

<!-- ==================== SECTIONS ==================== -->
{{SECTIONS}}

<!-- ==================== CTA ==================== -->
<section class="cta">
  <h2 class="cta-title">{{CTA_TITLE}}</h2>
  <p class="cta-desc">{{CTA_DESC}}</p>
  <div>{{CTA_BUTTON}}</div>
</section>

<!-- ==================== FOOTER ==================== -->
<div class="footer">
  {{FOOTER_TEXT}}
</div>

</body>
</html>
