version: 1

# ⚠️ 项目特化文件：描述当前项目的模块结构。
# 在新项目中安装 AODW 时，必须清空并重写本文件。
# 模块索引 - 由 AI 在知识蒸馏时自动维护
# 每当新增模块或修改模块结构时，AI 必须更新此文件

modules:
  # 音频管理模块
  - name: audio
    path: docs/modules/audio.md
    root: apps/*/src-tauri/src/services/audio_*.rs
    description: 音频录制、播放、音频流处理

  # 语音识别模块
  - name: stt
    path: docs/modules/stt.md
    root: apps/*/src-tauri/src/services/stt/
    description: 语音转文字，支持多供应商切换（火山引擎、阿里云、腾讯云）

  # 语音合成模块
  - name: tts
    path: docs/modules/tts.md
    root: apps/*/src-tauri/src/services/tts/
    description: 文字转语音，支持多供应商切换（火山引擎、阿里云、腾讯云）

  # 热键管理模块
  - name: hotkey
    path: docs/modules/hotkey.md
    root: apps/*/src-tauri/src/services/hotkey_v2/
    description: 全局热键注册、监听、事件处理

  # 自动粘贴模块
  - name: auto-paste
    path: docs/modules/auto-paste.md
    root: apps/*/src-tauri/src/services/auto_paste.rs
    description: 将识别结果自动输入到当前光标位置

  # 配置管理模块
  - name: config
    path: docs/modules/config.md
    root: apps/*/src-tauri/src/services/config_manager.rs
    description: 应用配置的读取、保存、验证

  # Agent 系统模块（仅 Pro 版）
  - name: agent
    path: docs/modules/agent.md
    root: apps/voicex-pro/src-tauri/src/services/agent/
    description: AI Agent 运行时、工具调用、记忆管理、场景加载

  # LLM 模块（仅 Pro 版）
  - name: llm
    path: docs/modules/llm.md
    root: apps/voicex-pro/src-tauri/src/services/llm.rs
    description: 大语言模型调用、流式响应处理

  # 训练系统模块（仅 Pro 版）
  - name: training
    path: docs/modules/training.md
    root: apps/voicex-pro/src-tauri/src/commands/training.rs
    description: 医药代表陪练系统、场景管理、教练评分

  # 共享工具库
  - name: voicex-utils
    path: docs/modules/voicex-utils.md
    root: crates/voicex-utils/
    description: 共享工具库（错误类型、通用工具）

  # 配置管理库
  - name: voicex-config
    path: docs/modules/voicex-config.md
    root: crates/voicex-config/
    description: 配置管理库（配置结构定义和管理）
