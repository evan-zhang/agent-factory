# 港股休市日规则

## 固定休市日
- 元旦：1月1日
- 农历新年：除夕至初三（按农历，通常4天）
- 清明节：4月4日或5日
- 耶稣受难日：Good Friday（复活节前的周五）
- 复活节星期一：Easter Monday
- 劳动节：5月1日
- 佛诞：农历四月初八
- 端午节：农历五月初五
- 香港回归纪念日：7月1日
- 中秋节翌日：农历八月十五的次日
- 国庆日：10月1日
- 重阳节：农历九月初九
- 圣诞节：12月25日
- 圣诞节后第一个周日：Boxing Day（12月26日，如遇周日则顺延）

## 特殊规则
- 如果休市日落在周六 → 前一个周五休市
- 如果休市日落在周日 → 后一个周一休市
- 台风信号（8号或以上）→ 可能临时休市半日或全日
- 黑色暴雨警告 → 可能临时休市
- 台风/暴雨为不可预判因素，cron 无法处理，由监控脚本兜底

## 2026年精确休市日（已确认）
- 元旦：1月1日（周四）
- 农历新年：2月16日（周一，除夕半日）、2月17-20日（周二至周五）
- 清明节翌日：4月6日（周一）
- 复活节星期一翌日：4月7日（周二）
- 耶稣受难日：4月3日（周五）
- 复活节星期一：4月6日（周一）
- 劳动节：5月1日（周五）
- 佛诞翌日：5月25日（周一）
- 端午节：6月19日（周五）
- 回归日：7月1日（周三）
- 中秋节翌日：约10月（待确认）
- 国庆：10月1日（周四）
- 重阳节：约10月（待确认）
- 圣诞：12月25日（周五）
- Boxing Day：12月26日（周六，顺延至12月28日周一）

**重要：6月1日（周一）不是休市日，港股正常开市。**

## 判断逻辑
```
1. 如果是周六/周日 → 休市（cron 不触发）
2. 如果在上述日期 → 休市
3. 如果台风/黑雨信号生效 → 临时休市（无法预判）
4. 否则 → 交易日
```
