# A股休市日规则

## 固定休市日
- 元旦：1月1日（调休连休）
- 春节：除夕至初六（按国务院公告，通常7天）
- 清明节：4月4日或5日（调休连休3天）
- 劳动节：5月1日（调休连休5天）
- 端午节：农历五月初五（调休连休3天）
- 中秋节：农历八月十五（调休连休3天）
- 国庆节：10月1日至7日

## 特殊规则
- 周末休市（周六周日）
- 调休日可能周末补班但股市仍休市（如国庆前周末补班但股市不开）
- 国务院每年底公布下一年放假安排，以实际公告为准
- 遇到重大突发事件可能临时休市

## 2026年预计休市（待国务院公告确认）
- 元旦：1月1日-3日
- 春节：约2月中旬（农历新年）
- 清明：4月4日-6日
- 劳动节：5月1日-5日
- 端午：约5月下旬-6月初
- 中秋：约9月-10月
- 国庆：10月1日-7日

## 判断逻辑
```
1. 如果是周六/周日 → 休市（cron 不触发）
2. 如果在上述日期范围内 → 休市
3. 否则 → 交易日
```
