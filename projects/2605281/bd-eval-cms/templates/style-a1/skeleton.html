<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<style>
@page { size:A4; margin:26mm 24mm 22mm 24mm; }
@page :first { margin:0; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC","SimSun",Arial,sans-serif;
  font-size:10.5pt; line-height:1.65; color:{{text-main}};
  background:{{bg-white}}; -webkit-font-smoothing:antialiased;
}
a { color:{{primary}}; text-decoration:none; }

/* ===== COVER PAGE ===== */
.cover {
  min-height:96vh; display:flex; flex-direction:column; justify-content:center;
  padding:44mm 30mm;
  background:{{cover-gradient}};
  border-bottom:{{cover-border}}; position:relative;
}
.cover-topbar { position:absolute; top:0; left:0; right:0; height:5px; background:{{primary}}; }
.cover-classification {
  position:absolute; top:20px; right:30mm;
  background:{{classification-bg}}; color:{{classification-color}};
  padding:8px 16px; font-size:9pt; font-weight:700;
  border:{{classification-border}}; letter-spacing:0.06em;
}
.cover-badge {
  display:inline-block; font-size:9pt; font-weight:700; letter-spacing:0.12em;
  color:{{cover-badge-color}}; border:{{cover-badge-border}}; padding:3px 12px; margin-bottom:20px;
  text-transform:uppercase;
}
.cover-title {
  font-size:30pt; font-weight:800; color:{{cover-title-color}}; letter-spacing:0.06em;
  line-height:1.2; margin-bottom:16px;
}
.cover-subtitle { font-size:18pt; font-weight:600; color:{{cover-subtitle-color}}; margin-bottom:10px; }
.cover-company { font-size:13pt; color:{{cover-company-color}}; margin-bottom:36px; }
.cover-meta { font-size:11pt; line-height:2.1; color:{{cover-meta-color}}; }
.cover-meta .lbl { color:{{cover-meta-label-color}}; font-weight:600; }
.cover-confidential {
  margin-top:40px; font-size:9pt; font-weight:700; color:{{cover-confidential-color}};
  letter-spacing:0.06em; border-top:{{cover-confidential-border}}; padding-top:12px;
}
.cover-rating-box {
  position:absolute; bottom:40px; right:30mm;
  background:{{primary}}; color:#FFFFFF; text-align:center;
  padding:12px 20px; min-width:120px; border-radius:4px;
}
.cover-rating-box .rating-label { font-size:9pt; letter-spacing:0.08em; opacity:0.85; }
.cover-rating-box .rating-val { font-size:22pt; font-weight:800; line-height:1.2; }

/* ===== CLASSIFICATION BAR ===== */
.classification-bar {
  background:{{classification-bar-bg}}; color:{{classification-bar-color}};
  padding:6px 28mm; font-size:8.5pt; font-weight:600;
  border-bottom:{{classification-bar-border}};
  display:flex; justify-content:space-between; align-items:center;
}
.classification-bar .recipients { font-weight:400; opacity:0.9; }

/* ===== TABLE OF CONTENTS ===== */
.toc-section { padding:28px 28mm 28px; background:{{toc-bg}}; border-bottom:{{toc-border}}; }
.toc-header { font-size:14pt; font-weight:700; color:{{toc-header-color}}; margin-bottom:14px; border-left:{{toc-header-border}}; padding-left:10px; }
.toc-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px 28px; }
.toc-item { display:flex; align-items:baseline; gap:6px; padding:3px 0; border-bottom:{{toc-item-border}}; font-size:9.5pt; }
.toc-num { color:{{toc-num-color}}; font-weight:700; min-width:30px; }
.toc-title { color:{{toc-title-color}}; flex:1; }
.toc-ch { color:{{toc-ch-color}}; font-size:8.5pt; }

/* ===== CHAPTER HEADINGS ===== */
.chapter { padding:0 28mm; page-break-after:always; }
.chapter:last-child { page-break-after:auto; }
h1 {
  font-size:17pt; font-weight:700; color:{{h1-color}};
  background:{{h1-bg}}; border-bottom:{{h1-border}};
  padding:10px 14px 8px; margin:24px 0 14px;
}
h2 {
  font-size:12.5pt; font-weight:700; color:{{h2-color}};
  border-left:{{h2-border}}; padding:6px 10px; margin:20px 0 10px;
  background:{{h2-bg}};
}
h3 { font-size:11pt; font-weight:700; color:{{h3-color}}; margin:14px 0 7px; }
h4 { font-size:10.5pt; font-weight:700; color:{{h4-color}}; margin:12px 0 6px; }

/* ===== BODY ===== */
p { margin:0 0 8px; }
ul,ol { margin:6px 0 10px; padding-left:20px; }
li { margin-bottom:5px; }

/* ===== TABLES ===== */
table { width:100%; border-collapse:collapse; margin:12px 0 18px; font-size:9.5pt; }
th {
  background:{{th-bg}}; color:{{th-color}}; font-weight:700; text-align:left;
  padding:8px 10px; border:{{th-border}};
}
td { padding:7px 10px; border:{{td-border}}; vertical-align:top; line-height:1.5; }
tr:nth-child(even) td { background:{{td-alt-bg}}; }

/* Status colors */
.pass { color:{{pass-green}}; font-weight:700; }
.cond { color:{{cond-amber}}; font-weight:700; }
.fail { color:{{fail-red}}; font-weight:700; }
.pending-tag { color:{{cond-amber}}; font-style:italic; font-weight:600; }
.b { font-weight:700; }

/* ===== GATE CONCLUSION CARD ===== */
.gate-card {
  border-left:{{gate-card-border}}; background:{{gate-card-bg}};
  padding:{{gate-card-padding}}; margin:16px 0; line-height:1.65;
  border-radius:0;
}
.gate-card .gate-title {
  font-size:{{gate-title-size}}; font-weight:700; margin-bottom:8px;
  padding-bottom:6px; border-bottom:2px solid rgba(0,0,0,0.08);
}
.gate-card .gate-label {
  font-size:{{gate-label-size}}; font-weight:600; display:inline-block;
  padding:2px 8px; margin-right:6px; border-radius:{{badge-radius}};
}
.gate-card .gate-body { margin-top:8px; }

/* Gate pass */
.gate-pass { border-left-color:{{gate-pass-border}}; background:{{gate-pass-bg}}; }
.gate-pass .gate-title { color:{{gate-pass-text}}; }
.gate-pass .gate-label { background:{{gate-pass-bg}}; color:{{gate-pass-text}}; border:1px solid {{gate-pass-border}}; }

/* Gate conditional */
.gate-conditional { border-left-color:{{gate-conditional-border}}; background:{{gate-conditional-bg}}; }
.gate-conditional .gate-title { color:{{gate-conditional-text}}; }
.gate-conditional .gate-label { background:{{gate-conditional-bg}}; color:{{gate-conditional-text}}; border:1px solid {{gate-conditional-border}}; }

/* Gate stop */
.gate-stop { border-left-color:{{gate-stop-border}}; background:{{gate-stop-bg}}; }
.gate-stop .gate-title { color:{{gate-stop-text}}; }
.gate-stop .gate-label { background:{{gate-stop-bg}}; color:{{gate-stop-text}}; border:1px solid {{gate-stop-border}}; }

/* ===== CONFIDENCE BADGE ===== */
.confidence-badge {
  display:inline-block; font-size:9pt; font-weight:700;
  padding:2px 8px; border-radius:{{badge-radius}}; line-height:1.3;
  vertical-align:middle; margin-left:4px;
}
.conf-a { background:{{confidence-a-bg}}; color:{{confidence-a-text}}; }
.conf-b { background:{{confidence-b-bg}}; color:{{confidence-b-text}}; }
.conf-c { background:{{confidence-c-bg}}; color:{{confidence-c-text}}; }
.conf-d { background:{{confidence-d-bg}}; color:{{confidence-d-text}}; }

/* ===== BATTLE REVIEW ===== */
.battle-auditor {
  border-left:4px solid {{battle-auditor-border}}; background:{{battle-auditor-bg}};
  padding:12px 14px; margin:12px 0; line-height:1.65;
}
.battle-executor {
  border-left:4px solid {{battle-executor-border}}; background:{{battle-executor-bg}};
  padding:12px 14px; margin:8px 0 12px 20px; line-height:1.65;
}
.battle-dispute {
  border-left:4px solid {{battle-dispute-border}}; background:#FFFBEB;
  padding:10px 14px; margin:10px 0; line-height:1.65;
}
.battle-label {
  font-size:8.5pt; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
  display:block; margin-bottom:4px; opacity:0.7;
}

/* ===== SPECIAL BOXES ===== */
/* Conclusion Box */
.conclusion-box {
  border-left:5px solid {{conclusion-border}}; background:{{conclusion-bg}};
  padding:12px 14px; margin:12px 0; line-height:1.65;
}

/* Risk Box */
.risk-box {
  border-left:5px solid {{risk-box-border}}; background:{{risk-box-bg}};
  padding:12px 14px; margin:12px 0; line-height:1.65;
}

/* Neutral Box */
.neutral-box {
  border-left:4px solid {{neutral-border}}; background:{{neutral-bg}};
  padding:10px 14px; margin:10px 0; line-height:1.65;
}

/* Veto Box */
.veto-box {
  border-left:5px solid {{veto-box-border}}; background:{{veto-box-bg}};
  padding:12px 14px; margin:12px 0; line-height:1.65;
}

/* Conflict Box */
.conflict-box {
  border-left:4px solid {{conflict-border}}; background:{{conflict-bg}};
  padding:10px 14px; margin:10px 0; line-height:1.65;
}

/* Exclusion Box (业务主体互斥规则约束框) */
.exclusion-box {
  border:2px solid {{exclusion-border}}; background:{{exclusion-bg}};
  padding:12px 16px; margin:16px 0; line-height:1.6;
}
.exclusion-box strong { color:{{exclusion-text}}; }

/* ===== GLOSSARY TABLE ===== */
.glossary-table {
  width:100%; border-collapse:collapse; margin:16px 0;
  font-size:9pt;
}
.glossary-table th {
  background:{{primary}}; color:#FFFFFF; font-weight:700;
  padding:8px 10px; text-align:left;
}
.glossary-table td {
  border:{{td-border}}; padding:6px 10px;
  vertical-align:top; line-height:1.5;
}
.glossary-table td:first-child {
  font-weight:600; width:35%; background:{{light-bg}};
}

/* ===== ONE-PAGER STRUCTURE ===== */
.one-pager {
  background:{{one-pager-bg}}; border:{{one-pager-border}};
  padding:16px; margin:16px 0; line-height:1.65;
}
.one-pager-header {
  font-size:13pt; font-weight:700; color:{{primary}};
  margin-bottom:12px; padding-bottom:8px;
  border-bottom:2px solid {{primary}};
}

/* ===== ROLE VISUAL SYSTEM ===== */
.role-bd { color:{{role-bd}}; font-weight:600; }
.role-tech { color:{{role-tech}}; font-weight:600; }
.role-comm { color:{{role-comm}}; font-weight:600; }
.role-support { color:{{role-support}}; font-weight:600; }
.role-ai { color:{{role-ai}}; font-weight:600; }
.role-decision { color:{{role-decision}}; font-weight:600; }
.role-pmo { color:{{role-pmo}}; font-weight:600; }

/* ===== STAGE TAGS ===== */
.stage-tag {
  display:inline-block; font-size:8.5pt; font-weight:700;
  padding:2px 8px; border-radius:{{badge-radius}}; line-height:1.3;
  vertical-align:middle;
}
.stage-a,.tag-a { background:{{stage-a-bg}}; color:{{stage-a-text}}; }
.stage-b,.tag-b { background:{{stage-b-bg}}; color:{{stage-b-text}}; }
.stage-c,.tag-c { background:{{stage-c-bg}}; color:{{stage-c-text}}; }

/* ===== WATERMARKS ===== */
.watermark-internal {
  position:fixed; top:50%; left:50%; transform:translate(-50%, -50%) rotate(-45deg);
  font-size:80pt; font-weight:900; color:rgba(26,58,92,0.03);
  pointer-events:none; z-index:-1; white-space:nowrap;
}
.redacted {
  background:#000; color:#000;
  padding:0 4px; border-radius:2px;
}

/* ===== CAPTION & FIGCAPTION ===== */
.caption { font-size:9pt; color:{{text-muted}}; font-style:italic; margin:4px 0 8px; }
figcaption { font-size:9pt; color:{{text-muted}}; font-style:italic; margin:4px 0 8px; text-align:center; }
.figure-number { font-weight:700; color:{{primary}}; margin-right:4px; }

/* ===== DRL PRIORITY ===== */
.drl-priority {
  display:inline-block; font-size:8.5pt; font-weight:700;
  padding:2px 8px; border-radius:{{badge-radius}}; line-height:1.3;
  vertical-align:middle;
}
.drl-p0 { background:{{drl-p0-bg}}; color:{{drl-p0-text}}; }
.drl-p1 { background:{{drl-p1-bg}}; color:{{drl-p1-text}}; }
.drl-p2 { background:{{drl-p2-bg}}; color:{{drl-p2-text}}; }

/* ===== RISK LEVEL ===== */
.risk-high { border-left:4px solid {{risk-high-border}}; background:{{risk-high-bg}}; padding:10px 14px; margin:10px 0; }
.risk-medium { border-left:4px solid {{risk-medium-border}}; background:{{risk-medium-bg}}; padding:10px 14px; margin:10px 0; }
.risk-low { border-left:4px solid {{risk-low-border}}; background:{{risk-low-bg}}; padding:10px 14px; margin:10px 0; }

/* Highlight boxes */
.highlight-box {
  border-left:{{highlight-border}}; background:{{highlight-bg}};
  padding:10px 14px; margin:12px 0; line-height:1.65;
}

/* Rating badge */
.rating-badge {
  display:inline-block; font-size:12pt; font-weight:800;
  color:{{rating-badge-color}}; border:{{rating-badge-border}}; padding:3px 14px; margin-top:6px;
}
.summary-tag { font-weight:700; color:{{summary-tag-color}}; }

/* Code blocks */
pre {
  font-family:"Courier New",Courier,monospace; font-size:9pt;
  background:{{pre-bg}}; border:{{pre-border}}; border-left:{{pre-accent}};
  padding:10px 14px; margin:10px 0 14px; line-height:1.7; color:{{pre-color}}; white-space:pre-wrap;
}
blockquote {
  border-left:{{blockquote-border}}; background:{{blockquote-bg}};
  padding:10px 14px; margin:12px 0; color:{{blockquote-color}};
}

/* Table header variants */
.th-green th { background:{{th-green-bg}} !important; border-color:{{th-green-bg}} !important; }
.th-red th { background:{{th-red-bg}} !important; border-color:{{th-red-bg}} !important; }
.th-warm th { background:{{th-warm-bg}} !important; border-color:{{th-warm-bg}} !important; }

/* ===== FOOTER ===== */
.report-footer {
  font-size:8.5pt; color:{{footer-color}}; border-top:{{footer-border}};
  padding-top:6px; margin-top:24px;
}

/* Sub-label in table first col */
.td-label td:first-child { background:{{td-label-bg}} !important; font-weight:600; white-space:nowrap; width:160px; }

/* Section divider */
.section-rule { border-top:{{section-rule}}; margin:20px 0; }

/* Score highlight */
.score-a { color:{{score-a}}; font-weight:700; }
.score-b { color:{{score-b}}; font-weight:700; }
.score-c { color:{{score-c}}; font-weight:700; }

/* Gate summary table */
.gate-summary th { background:{{h2-color}}; color:#FFFFFF; }
.gate-summary td:nth-child(2) { font-weight:700; }

/* ===== RESPONSIVE ===== */
@media screen and (max-width:768px){
  body{font-size:9.5pt;line-height:1.65}
  .cover{padding:20mm 12mm}
  .cover-title{font-size:22pt}
  .cover-subtitle{font-size:14pt}
  .cover-meta{font-size:10pt}
  .cover-rating-box{bottom:20px;right:12mm;padding:8px 14px;min-width:100px}
  .cover-rating-box .rating-val{font-size:16pt}
  .cover-topbar,.cover-topline{height:3px}
  .toc-section{padding:16px 10mm}
  .toc-grid{grid-template-columns:1fr;gap:3px}
  .chapter{padding:0 10mm}
  h1{font-size:14pt;padding:8px 10px}
  h2{font-size:11.5pt}
  table{font-size:8.5pt;margin:10px 0 14px}
  th,td{padding:5px 7px}
  pre{font-size:8pt;padding:8px 10px}
  .highlight-box{padding:8px 10px;margin:8px 0}
  .gate-card{padding:10px 12px;margin:12px 0}
  .battle-auditor,.battle-executor,.battle-dispute{padding:8px 10px;margin:8px 0}
  .battle-executor{margin-left:10px}
  .confidence-badge,.stage-tag,.drl-priority{font-size:8pt;padding:1px 6px}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:12px 0 18px}
  .classification-bar{padding:6px 10mm;}
}
@media screen and (max-width:480px){
  body{font-size:9pt}
  .cover{padding:16mm 10mm}
  .cover-title{font-size:18pt}
  table{font-size:8pt}
}
@media print{
  .chapter{padding:0}
  body{background:#FFF}
  .watermark-internal{display:none;}
}
</style>
</head>
<body>

<!-- ==================== WATERMARK ==================== -->
<div class="watermark-internal">内部机密</div>

<!-- ==================== COVER PAGE ==================== -->
<div class="cover page-break">
  <div class="cover-topbar"></div>
  <div class="cover-classification">内部机密 · 限投委会</div>
  <div class="cover-badge">CMS 投前评估报告</div>
  <div class="cover-title">A-1 投前评估报告</div>
  <div class="cover-subtitle">{{PRODUCT_EN}}</div>
  <div class="cover-company">{{COMPANY_NAME}}</div>
  <div class="cover-meta">
    <div><span class="lbl">案件代号：</span>{{CASE_CODE}}</div>
    <div><span class="lbl">评估技能：</span>{{SKILL_CODE}}</div>
    <div><span class="lbl">业务主体：</span>{{BUSINESS_UNIT}}</div>
    <div><span class="lbl">评估日期：</span>{{DATE}}</div>
    <div><span class="lbl">综合评级：</span><span class="b">{{RATING}}</span></div>
  </div>
  <div class="cover-confidential">⚠ 内部机密 — 仅限投委会成员阅览</div>
  <div class="cover-rating-box">
    <div class="rating-label">推荐结论</div>
    <div class="rating-val">{{RATING_SHORT}}</div>
  </div>
</div>

<!-- ==================== CLASSIFICATION BAR ==================== -->
<div class="classification-bar">
  <span>密级：内部机密</span>
  <span class="recipients">呈报：投委会成员 | 评估团队</span>
</div>

<!-- ==================== TABLE OF CONTENTS ==================== -->
<div class="toc-section page-break">
  <div class="toc-header">目 录</div>
  <div class="toc-grid">
    {{TOC_ITEMS}}
  </div>
</div>

<!-- ==================== CONTENT CHAPTERS ==================== -->
{{CHAPTERS}}

</body>
</html>
