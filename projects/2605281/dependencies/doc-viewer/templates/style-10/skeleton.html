<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #FFFFFF;
  --bg-alt: #F5F0EB;
  --bg-dark: #1E1715;
  --accent: #C97842;
  --accent-light: #D98B52;
  --gradient-start: #C97842;
  --gradient-end: #D98B52;
  --text: #1A1918;
  --text-secondary: #9C8F84;
  --border: #E6E0DA;
}
body {
  font-family:-apple-system,"PingFang SC","Inter","SF Pro Text",sans-serif;
  color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased;
}
a { color:var(--accent); text-decoration:none; }

/* ===== HERO ===== */
.hero {
  padding:100px 80px; text-align:center; background:linear-gradient(135deg,var(--gradient-start),var(--gradient-end));
  color:#FFF;
}
.hero-title {
  font-size:52pt; font-weight:800; color:#FFF;
  line-height:1.1; letter-spacing:-1px; margin-bottom:20px; max-width:900px; margin-left:auto; margin-right:auto;
}
.hero-desc {
  font-size:18pt; color:rgba(255,255,255,0.9);
  line-height:1.6; margin-bottom:32px; max-width:720px; margin-left:auto; margin-right:auto;
}
.hero-cta .btn-hero {
  display:inline-block; font-size:15pt; font-weight:600; color:#FFF;
  background:#1E1715; padding:16px 36px; border-radius:12px;
  border:none; cursor:pointer; transition:background 0.2s,transform 0.2s;
}
.hero-cta .btn-hero:hover { background:#2A2220; transform:translateY(-2px); }

/* ===== FEATURES ===== */
.features {
  padding:80px 80px; background:var(--bg-alt);
}
.features-header {
  text-align:center; margin-bottom:56px;
}
.features-header h2 {
  font-size:32pt; font-weight:800; color:var(--text); letter-spacing:-0.5px;
  margin-bottom:12px;
}
.features-header p {
  font-size:16pt; color:var(--text-secondary);
}
.features-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:28px;
  max-width:1200px; margin:0 auto;
}
.feature-card {
  background:#FFF; border-radius:20px; padding:36px 28px;
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
  transition:transform 0.2s,box-shadow 0.2s;
}
.feature-card:hover { transform:translateY(-6px); box-shadow:0 16px 48px rgba(0,0,0,0.1); }
.feature-icon {
  width:56px; height:56px; background:linear-gradient(135deg,var(--gradient-start),var(--gradient-end));
  border-radius:16px; display:flex; align-items:center; justify-content:center;
  font-size:24pt; color:#FFF; margin-bottom:20px;
}
.feature-card h3 {
  font-size:18pt; font-weight:700; color:var(--text); margin-bottom:12px;
}
.feature-card p {
  font-size:13.5pt; line-height:1.6; color:var(--text-secondary);
}

/* ===== CODE SECTION ===== */
.code-section {
  padding:80px 80px; background:var(--bg);
}
.code-header {
  text-align:center; margin-bottom:40px;
}
.code-header h2 {
  font-size:32pt; font-weight:800; color:var(--text); letter-spacing:-0.5px;
  margin-bottom:12px;
}
.code-header p {
  font-size:16pt; color:var(--text-secondary);
}
.code-block {
  background:var(--bg-dark); border-radius:20px;
  padding:36px; max-width:900px; margin:0 auto;
  overflow-x:auto;
}
.code-block pre {
  font-family:"Menlo","Consolas","Monaco",monospace;
  font-size:13pt; line-height:1.7; color:#E8E4DF;
  white-space:pre-wrap; word-wrap:break-word;
}
.code-keyword { color:#C97842; font-weight:600; }
.code-string { color:#D98B52; }
.code-comment { color:#6B5E54; font-style:italic; }
.code-function { color:#E8E4DF; }

/* ===== CTA ===== */
.cta {
  text-align:center; padding:100px 80px; background:linear-gradient(135deg,var(--gradient-start),var(--gradient-end));
  color:#FFF;
}
.cta-title {
  font-size:36pt; font-weight:800; color:#FFF; letter-spacing:-0.5px;
  margin-bottom:16px; max-width:800px; margin-left:auto; margin-right:auto;
}
.cta-desc {
  font-size:16pt; color:rgba(255,255,255,0.9); margin-bottom:36px;
  max-width:640px; margin-left:auto; margin-right:auto;
}
.cta-button .btn-cta {
  display:inline-block; font-size:15pt; font-weight:600; color:#FFF;
  background:#1E1715; padding:16px 40px; border-radius:12px;
  border:none; cursor:pointer; transition:background 0.2s,transform 0.2s;
}
.cta-button .btn-cta:hover { background:#2A2220; transform:translateY(-2px); }

/* ===== FOOTER ===== */
.footer {
  padding:32px 80px; border-top:1px solid var(--border);
  font-size:12pt; color:var(--text-secondary); text-align:center;
}

/* ===== RESPONSIVE ===== */
@media screen and (max-width:768px){
  .hero { padding:60px 40px; }
  .hero-title { font-size:36pt; }
  .hero-desc { font-size:15pt; }
  .features, .code-section { padding:60px 40px; }
  .features-grid { grid-template-columns:1fr; gap:20px; }
  .features-header h2, .code-header h2 { font-size:24pt; }
  .cta { padding:60px 40px; }
  .cta-title { font-size:26pt; }
  .code-block { padding:24px; }
  .footer { padding:24px 40px; }
}
@media screen and (max-width:480px){
  .hero { padding:40px 24px; }
  .hero-title { font-size:28pt; }
  .hero-desc { font-size:13pt; }
  .features, .code-section { padding:40px 24px; }
  .features-header h2, .code-header h2 { font-size:20pt; }
  .features-header p, .code-header p { font-size:14pt; }
  .feature-card { padding:28px 20px; }
  .cta { padding:40px 24px; }
  .cta-title { font-size:22pt; }
  .cta-desc { font-size:14pt; }
  .footer { padding:20px 24px; }
}
@media print{
  body { background:#FFF; }
  .hero { padding:20px; }
  .features, .code-section, .cta { padding:20px; }
  .code-block { page-break-inside:avoid; }
}
</style>
</head>
<body>

<!-- ==================== HERO ==================== -->
<section class="hero">
  <h1 class="hero-title">{{HERO_TITLE}}</h1>
  <p class="hero-desc">{{HERO_DESC}}</p>
  <div class="hero-cta">{{HERO_CTA}}</div>
</section>

<!-- ==================== FEATURES ==================== -->
<section class="features">
  <div class="features-header">
    <h2>{{FEATURES_TITLE}}</h2>
    <p>{{FEATURES_SUBTITLE}}</p>
  </div>
  <div class="features-grid">{{FEATURES}}</div>
</section>

<!-- ==================== CODE SECTION ==================== -->
<section class="code-section">
  <div class="code-header">
    <h2>{{CODE_TITLE}}</h2>
    <p>{{CODE_SUBTITLE}}</p>
  </div>
  <div class="code-block">{{CODE_SECTION}}</div>
</section>

<!-- ==================== CTA ==================== -->
<section class="cta">
  <h2 class="cta-title">{{CTA_TITLE}}</h2>
  <p class="cta-desc">{{CTA_DESC}}</p>
  <div class="cta-button">{{CTA_BUTTON}}</div>
</section>

<!-- ==================== FOOTER ==================== -->
<div class="footer">
  {{FOOTER_TEXT}}
</div>

</body>
</html>
