<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:"MiSans","PingFang SC","Inter","Helvetica Neue",sans-serif;
  color:#1E1715; background:#EFE4D6; -webkit-font-smoothing:antialiased;
}
a { color:#C97842; text-decoration:none; }

/* ===== HERO ===== */
.hero {
  min-height:92vh; display:flex; align-items:center; justify-content:space-between;
  padding:80px 120px; gap:60px;
}
.hero-content { flex:1; max-width:560px; }
.hero-tag {
  display:inline-block; font-size:10pt; font-weight:700; letter-spacing:2px;
  color:#C97842; background:#F7EFE7; padding:6px 16px; border-radius:20px;
  margin-bottom:28px; text-transform:uppercase;
}
.hero-title {
  font-size:52pt; font-weight:800; line-height:1.05; letter-spacing:-2px;
  color:#1E1715; margin-bottom:20px;
}
.hero-desc {
  font-size:13pt; line-height:1.75; color:#2B211D; margin-bottom:36px;
}
.hero-cta { display:flex; gap:14px; }
.btn-primary {
  display:inline-block; font-size:12pt; font-weight:700; color:#FFF;
  background:#C97842; padding:14px 32px; border-radius:12px; border:none; cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s;
}
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(201,120,66,0.3); }
.btn-secondary {
  display:inline-block; font-size:12pt; font-weight:600; color:#1E1715;
  background:transparent; padding:14px 32px; border-radius:12px;
  border:2px solid #C8BCB2; cursor:pointer; transition:border-color 0.2s;
}
.btn-secondary:hover { border-color:#C97842; }
.hero-mockup {
  flex:1; max-width:520px; min-height:380px;
  background:#F7EFE7; border-radius:24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  display:flex; align-items:center; justify-content:center;
  font-size:11pt; color:#9C8F84;
}

/* ===== FEATURES ===== */
.features {
  padding:80px 120px; background:#E6D9CA;
}
.features-header {
  text-align:center; margin-bottom:56px;
}
.features-header h2 {
  font-size:28pt; font-weight:800; color:#1E1715; letter-spacing:-1px;
  margin-bottom:12px;
}
.features-header p {
  font-size:12pt; color:#9C8F84;
}
.features-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:28px;
}
.feature-card {
  background:#F7EFE7; border-radius:24px; padding:36px 28px;
  box-shadow:0 6px 20px rgba(0,0,0,0.04);
  transition:transform 0.2s,box-shadow 0.2s;
}
.feature-card:hover { transform:translateY(-4px); box-shadow:0 12px 36px rgba(0,0,0,0.08); }
.feature-icon {
  width:48px; height:48px; background:#EFE4D6; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:22pt; margin-bottom:20px;
}
.feature-card h3 {
  font-size:14pt; font-weight:700; color:#1E1715; margin-bottom:10px;
}
.feature-card p {
  font-size:10.5pt; line-height:1.65; color:#9C8F84;
}

/* ===== CONTENT SECTION ===== */
.content-section {
  padding:80px 120px;
}
.content-section h2 {
  font-size:24pt; font-weight:800; color:#1E1715; letter-spacing:-1px;
  margin-bottom:20px;
}
.content-section p {
  font-size:11pt; line-height:1.75; color:#2B211D; margin-bottom:14px;
}
.content-section ul {
  margin:12px 0 20px; padding-left:20px;
}
.content-section li {
  font-size:11pt; line-height:1.75; color:#2B211D; margin-bottom:6px;
}

/* ===== CTA ===== */
.cta-section {
  text-align:center; padding:80px 120px; background:#E6D9CA;
}
.cta-section h2 {
  font-size:28pt; font-weight:800; color:#1E1715; letter-spacing:-1px;
  margin-bottom:14px;
}
.cta-section p {
  font-size:12pt; color:#9C8F84; margin-bottom:32px;
}

/* ===== FOOTER ===== */
.footer {
  padding:28px 120px; border-top:1px solid #D9D0C6;
  font-size:9pt; color:#9C8F84; text-align:center;
}

/* ===== RESPONSIVE ===== */
@media screen and (max-width:768px){
  .hero { flex-direction:column; padding:40px 24px; min-height:auto; }
  .hero-title { font-size:32pt; }
  .hero-mockup { max-width:100%; min-height:240px; }
  .features { padding:40px 24px; }
  .features-grid { grid-template-columns:1fr; gap:20px; }
  .content-section { padding:40px 24px; }
  .cta-section { padding:40px 24px; }
  .footer { padding:20px 24px; }
}
@media screen and (max-width:480px){
  .hero { padding:28px 16px; }
  .hero-title { font-size:24pt; }
  .features { padding:28px 16px; }
  .content-section { padding:28px 16px; }
  .cta-section { padding:28px 16px; }
}
@media print{
  body { background:#FFF; }
  .hero { min-height:auto; padding:20px; }
  .features, .cta-section { padding:20px; }
}
</style>
</head>
<body>

<!-- ==================== HERO ==================== -->
<section class="hero">
  <div class="hero-content">
    <div class="hero-tag">{{HERO_TAG}}</div>
    <h1 class="hero-title">{{HERO_TITLE}}</h1>
    <p class="hero-desc">{{HERO_DESC}}</p>
    <div class="hero-cta">{{HERO_CTA}}</div>
  </div>
  <div class="hero-mockup">{{HERO_MOCKUP}}</div>
</section>

<!-- ==================== FEATURES ==================== -->
<section class="features">
  <div class="features-header">
    <h2>{{FEATURES_TITLE}}</h2>
    <p>{{FEATURES_SUBTITLE}}</p>
  </div>
  <div class="features-grid">{{FEATURES}}</div>
</section>

<!-- ==================== CONTENT ==================== -->
<section class="content-section">
{{CONTENT}}
</section>

<!-- ==================== CTA ==================== -->
<section class="cta-section">
  <h2>{{CTA_TITLE}}</h2>
  <p>{{CTA_DESC}}</p>
  <div>{{CTA_BUTTON}}</div>
</section>

<!-- ==================== FOOTER ==================== -->
<div class="footer">
  {{FOOTER_TEXT}}
</div>

</body>
</html>
