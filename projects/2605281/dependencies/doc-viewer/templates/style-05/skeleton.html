<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>数据看板</title>
<style>
@page { size:A4; margin: 0; }
* { margin: 0; padding:0; box-sizing:border-box; }
body {
  font-family:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
  background:#F5F7FA; color:#111827; line-height:1.6;
}
a { color:#C97842; text-decoration:none; }

/* ===== RESPONSIVE ===== */
@media screen and (max-width:768px){
  .page-wrap{padding:16px}
  .metrics-row{grid-template-columns:repeat(2,1fr) !important}
  .metric-card{font-size:9pt}
  .metric-num{font-size:28pt !important}
}
@media screen and (max-width:480px){
  .metrics-row{grid-template-columns:1fr !important}
  .metric-num{font-size:32pt !important}
}

/* ===== PAGE WRAP ===== */
.page-wrap { max-width:960px; margin: 0; padding:32px 48px; }

/* ===== HEADER ===== */
.board-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:28px;
}
.board-title { font-size:18pt; font-weight:700; color:#111827; }
.board-subtitle { font-size:12pt; color:#6B7280; margin-top:4px; }
.date-range {
  font-size:12pt; color:#6B7280; background:#fff;
  padding:6px 14px; border-radius:8px;
  border:1px solid #E5E7EB;
}

/* ===== METRICS GRID ===== */
.metrics-row {
  display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px;
}
.metric-card {
  background:#fff; border-radius:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
  padding:22px 20px; border:1px solid #E5E7EB;
}
.metric-label {
  font-size:12pt; color:#6B7280; font-weight:500; margin-bottom:10px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.metric-num {
  font-size:36pt; font-weight:800; line-height:1;
  margin-bottom:8px;
}
.metric-num.blue { color:#9A6736; }
.metric-num.green { color:#059669; }
.metric-num.red { color:#DC2626; }
.metric-num.yellow { color:#D97706; }
.metric-trend {
  font-size:13pt; font-weight:700; display:flex; align-items:center; gap:4px;
}
.trend-up { color:#059669; }
.trend-down { color:#DC2626; }
.trend-flat { color:#D97706; }
.metric-desc { font-size:11pt; color:#9CA3AF; margin-top:4px; }

/* ===== CHART AREA ===== */
.chart-area {
  background:#fff; border-radius:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
  padding:24px; margin-bottom:24px;
  border:1px solid #E5E7EB;
}
.chart-title { font-size:14pt; font-weight:700; color:#111827; margin-bottom:20px; }
.chart-placeholder {
  height:200px; background:#F9FAFB;
  border-radius:8px; display:flex; align-items:center; justify-content:center;
  color:#9CA3AF; font-size:13pt;
  border:1px dashed #E5E7EB;
}

/* ===== SECONDARY METRICS ===== */
.secondary-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:16px;
}
.secondary-card {
  background:#fff; border-radius:10px;
  padding:16px 20px; border:1px solid #E5E7EB;
}
.sec-label { font-size:11pt; color:#6B7280; margin-bottom:6px; }
.sec-value { font-size:20pt; font-weight:700; color:#9A6736; }
.sec-bar {
  height:6px; background:#E5E7EB; border-radius:3px; margin-top:10px; overflow:hidden;
}
.sec-bar-fill { height:100%; background:#9A6736; border-radius:3px; }

/* ===== FOOTER ===== */
.page-footer {
  text-align:center; font-size:11pt; color:#9CA3AF;
  border-top:1px solid #E5E7EB; padding-top:16px; margin-top:24px;
}
</style>
</head>
<body>
<div class="page-wrap">

  <!-- HEADER -->
  <div class="board-header">
    <div>
      <div class="board-title">产品管线季度看板</div>
      <div class="board-subtitle">核心运营指标总览</div>
    </div>
    <div class="date-range">📅 2026 Q1 — Q2</div>
  </div>

  <!-- METRICS ROW -->
  <div class="metrics-row">
    <div class="metric-card">
      <div class="metric-label">管线总数（个）</div>
      <div class="metric-num blue">24</div>
      <div class="metric-trend trend-up">↑ 4 <span style="color:#9CA3AF;font-weight:400">较上季度</span></div>
      <div class="metric-desc">含临床前~III期</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">进入临床阶段</div>
      <div class="metric-num green">8</div>
      <div class="metric-trend trend-up">↑ 2 <span style="color:#9CA3AF;font-weight:400">较上季度</span></div>
      <div class="metric-desc">Phase I~III</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">IND申报数（年度）</div>
      <div class="metric-num blue">6</div>
      <div class="metric-trend trend-flat">→ <span style="color:#9CA3AF;font-weight:400">持平</span></div>
      <div class="metric-desc">已获批 5 个</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">合作引进评估中</div>
      <div class="metric-num yellow">3</div>
      <div class="metric-trend trend-down">↓ 1 <span style="color:#9CA3AF;font-weight:400">较上季度</span></div>
      <div class="metric-desc">CG-0255 推进中</div>
    </div>
  </div>

  <!-- CHART AREA -->
  <div class="chart-area">
    <div class="chart-title">管线阶段分布趋势（近4季度）</div>
    <div class="chart-placeholder">
      📊 图表区域 — 可嵌入 ECharts / Chart.js 或 SVG 图表
    </div>
  </div>

  <!-- SECONDARY METRICS -->
  <div class="secondary-grid">
    <div class="secondary-card">
      <div class="sec-label">BD引进评估通过率</div>
      <div class="sec-value">33%</div>
      <div class="sec-bar"><div class="sec-bar-fill" style="width:33%"></div></div>
    </div>
    <div class="secondary-card">
      <div class="sec-label">IND->Phase I转化率</div>
      <div class="sec-value">83%</div>
      <div class="sec-bar"><div class="sec-bar-fill" style="width:83%"></div></div>
    </div>
    <div class="secondary-card">
      <div class="sec-label">年度研发投入（亿元）</div>
      <div class="sec-value">4.2</div>
      <div class="sec-bar"><div class="sec-bar-fill" style="width:60%"></div></div>
    </div>
  </div>

  <div class="page-footer">
    数据来源：内部管线管理系统 · 仅供内部使用 · 2026-05-15 更新
  </div>
</div>
</body>
</html>
