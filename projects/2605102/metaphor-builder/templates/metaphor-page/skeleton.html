<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — 隐喻故事</title>
  <style>
    /* === Design Tokens === */
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-elevated: #1a1a1a;
      --bg-reveal: #0d1117;
      --text-primary: #fafafa;
      --text-secondary: #a1a1a1;
      --text-tertiary: #525252;
      --accent: #ffffff;
      --accent-subtle: rgba(255,255,255,0.06);
      --border-subtle: rgba(255,255,255,0.08);
      --border-default: rgba(255,255,255,0.12);
      --glow-reveal: rgba(99,102,241,0.15);
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      --font-serif: 'Georgia', 'Times New Roman', serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;
      --max-width-story: 680px;
      --max-width-page: 800px;
      --padding-page: 24px;
    }

    @media (max-width: 640px) {
      :root { --padding-page: 16px; }
    }

    /* === Reset & Base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* === Layout === */
    .page-wrapper {
      max-width: var(--max-width-page);
      margin: 0 auto;
      padding: 0 var(--padding-page);
    }

    /* === Cover Section === */
    .cover {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 64px 0;
    }

    .cover__title {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 16px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 800ms ease-out forwards;
    }

    @media (max-width: 640px) {
      .cover__title { font-size: 1.5rem; }
    }

    .cover__subtitle {
      font-size: 1.125rem;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 500px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 800ms ease-out 200ms forwards;
    }

    .cover__scroll-hint {
      margin-top: 48px;
      color: var(--text-tertiary);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeIn 400ms ease 800ms forwards;
    }

    .cover__scroll-hint::after {
      content: '↓';
      display: block;
      margin-top: 8px;
      animation: bounce 2s infinite;
    }

    /* === Story Section === */
    .story {
      padding: 32px 0;
    }

    .scene {
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 600ms ease-out, transform 600ms ease-out;
    }

    .scene.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .scene__divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .scene__divider::before,
    .scene__divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }

    .scene__label {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
    }

    .scene__text {
      font-family: var(--font-serif);
      font-size: 1.0625rem;
      line-height: 1.8;
      color: var(--text-primary);
      max-width: var(--max-width-story);
      margin: 0 auto;
    }

    .scene__text p {
      margin-bottom: 1.2em;
    }

    .scene__text p:last-child {
      margin-bottom: 0;
    }

    /* === Reveal Section === */
    .reveal {
      background: var(--bg-reveal);
      border-top: 1px solid var(--border-default);
      border-bottom: 1px solid var(--border-default);
      padding: 80px 0;
      text-align: center;
      margin: 48px 0;
      opacity: 0;
      transform: scale(0.98);
      transition: opacity 1000ms ease-out, transform 1000ms ease-out;
    }

    .reveal.visible {
      opacity: 1;
      transform: scale(1);
      animation: revealGlow 2s ease-out forwards;
    }

    .reveal__label {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-tertiary);
      margin-bottom: 24px;
    }

    .reveal__concept {
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .reveal__definition {
      font-size: 1.125rem;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 500px;
      margin: 0 auto;
    }

    /* === Interpretation Section === */
    .interpretation {
      padding: 32px 0 64px;
    }

    .interp-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .interp-card__title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .interp-card__body {
      font-size: 0.9375rem;
      line-height: 1.7;
      color: var(--text-primary);
    }

    .interp-card__body p {
      margin-bottom: 12px;
    }

    .interp-card__body p:last-child {
      margin-bottom: 0;
    }

    /* Mapping table */
    .mapping-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    .mapping-table td {
      padding: 8px 0;
      border-bottom: 1px solid var(--border-subtle);
      vertical-align: top;
    }

    .mapping-table td:nth-child(2) {
      text-align: center;
      color: var(--text-tertiary);
      padding: 8px 12px;
    }

    .mapping-table tr:last-child td {
      border-bottom: none;
    }

    /* === Footer === */
    .footer {
      border-top: 1px solid var(--border-subtle);
      padding: 32px 0;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.75rem;
      line-height: 1.5;
    }

    .footer__share-hint {
      margin-top: 8px;
      color: var(--text-secondary);
    }

    /* === Animations === */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(6px); }
      60% { transform: translateY(3px); }
    }

    @keyframes revealGlow {
      0% { box-shadow: 0 0 0 rgba(99,102,241,0); }
      50% { box-shadow: 0 0 60px rgba(99,102,241,0.15); }
      100% { box-shadow: 0 0 0 rgba(99,102,241,0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* === Scroll Observer Placeholder === */
    .scroll-observer {
      /* Used by Intersection Observer; no visual output */
    }
  </style>
</head>
<body>

  <!-- Cover -->
  <section class="cover">
    <div class="page-wrapper">
      <h1 class="cover__title">{{STORY_TITLE}}</h1>
      <p class="cover__subtitle">{{WORLD_ONE_LINER}}</p>
      <div class="cover__scroll-hint">向下阅读</div>
    </div>
  </section>

  <!-- Story -->
  <section class="story">
    <div class="page-wrapper">

      {{SCENES}}

    </div>
  </section>

  <!-- Reveal -->
  <section class="reveal" data-reveal>
    <div class="page-wrapper">
      <div class="reveal__label">概念揭晓</div>
      <h2 class="reveal__concept">{{CONCEPT_NAME}}</h2>
      <p class="reveal__definition">{{CONCEPT_DEFINITION}}</p>
    </div>
  </section>

  <!-- Interpretation -->
  <section class="interpretation">
    <div class="page-wrapper">

      <!-- Card 1: Concept -->
      <div class="interp-card">
        <div class="interp-card__title">💡 概念本身</div>
        <div class="interp-card__body">
          {{INTERP_CONCEPT}}
        </div>
      </div>

      <!-- Card 2: Mapping -->
      <div class="interp-card">
        <div class="interp-card__title">🔗 隐喻映射</div>
        <div class="interp-card__body">
          {{INTERP_MAPPING}}
        </div>
      </div>

      <!-- Card 3: Theory -->
      <div class="interp-card">
        <div class="interp-card__title">🔬 理论对应</div>
        <div class="interp-card__body">
          {{INTERP_THEORY}}
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="page-wrapper">
      <div>Metaphor Builder · 隐喻构建器</div>
      <div class="footer__share-hint">分享这个故事，让别人也来猜猜背后的概念</div>
    </div>
  </footer>

  <!-- Intersection Observer -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });

      document.querySelectorAll('.scene, .reveal').forEach(el => {
        observer.observe(el);
      });
    });
  </script>

</body>
</html>
