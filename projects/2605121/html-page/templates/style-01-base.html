<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-blue': '#4285F4',
            'brand-green': '#34A853',
            'brand-yellow': '#FBBC05',
            'brand-red': '#EA4335',
            'bg-white': '#FFFFFF',
            'bg-gray': '#F5F6F7',
            'text-primary': '#1F2937',
            'text-secondary': '#5F6368',
            'text-muted': '#6B7280',
          },
          fontFamily: {
            'display': ['"Inter"', '"Helvetica Neue"', '"Segoe UI"', 'sans-serif'],
            'body': ['"Inter"', '"Helvetica Neue"', '"Segoe UI"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", "Helvetica Neue", "Segoe UI", sans-serif;
      color: #1F2937;
      background: #FFFFFF;
      -webkit-font-smoothing: antialiased;
    }

    /* Fade-in animation */
    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Counter animation */
    .counter {
      font-variant-numeric: tabular-nums;
    }

    /* Hero section */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(0.95) contrast(1.02) saturate(0.9);
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(66,133,244,0.85) 0%, rgba(47,111,228,0.75) 100%);
    }

    /* Data circle */
    .data-circle {
      width: 240px;
      height: 240px;
      border-radius: 999px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Color block card */
    .color-card {
      border-radius: 0;
      box-shadow: none;
      padding: 32px;
      color: white;
    }

    /* Image card */
    .image-card {
      overflow: hidden;
      border-bottom: 8px solid #34A853;
    }
    .image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.95) contrast(1.02) saturate(0.9);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F5F6F7; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
  </style>
</head>
<body>

  <!-- HERO SECTION -->
  <section class="hero relative">
    <div class="hero-bg" style="background-image: url('{{HERO_IMAGE}}');"></div>
    <div class="hero-overlay"></div>
    <div class="relative z-10 w-full max-w-6xl mx-auto px-8 md:px-16 py-20">
      <p class="text-white/80 text-sm tracking-widest uppercase mb-6 fade-up">{{SUBTITLE}}</p>
      <h1 class="text-white text-5xl md:text-7xl font-bold leading-[1.05] tracking-tight mb-8 fade-up" style="letter-spacing: -2px;">
        {{HERO_TITLE}}
      </h1>
      <p class="text-white/90 text-lg md:text-xl leading-relaxed max-w-2xl fade-up">
        {{HERO_DESCRIPTION}}
      </p>
    </div>
  </section>

  <!-- CONTENT SECTIONS -->
  {{CONTENT_SECTIONS}}

  <!-- DATA SECTION -->
  {{DATA_SECTION}}

  <!-- FOOTER -->
  <footer class="bg-bg-gray py-16 px-8 md:px-16">
    <div class="max-w-6xl mx-auto">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-text-muted text-sm">{{FOOTER_SOURCE}}</p>
          <p class="text-text-muted text-xs mt-2">{{FOOTER_DATE}}</p>
        </div>
        <div class="text-text-muted text-xs">
          {{FOOTER_LOGO}}
        </div>
      </div>
    </div>
  </footer>

  <!-- ANIMATION SCRIPT -->
  <script>
    // Intersection Observer for fade-up animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

    // Counter animation
    function animateCounter(el) {
      const target = parseInt(el.dataset.target);
      const suffix = el.dataset.suffix || '';
      const duration = 2000;
      const start = performance.now();

      function update(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(target * eased) + suffix;
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    const counterObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && !entry.target.dataset.animated) {
          entry.target.dataset.animated = 'true';
          animateCounter(entry.target);
        }
      });
    }, { threshold: 0.5 });

    document.querySelectorAll('.counter').forEach(el => counterObserver.observe(el));
  </script>

</body>
</html>
